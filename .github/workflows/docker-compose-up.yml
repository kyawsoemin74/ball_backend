name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint, Test, and Migration Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pytest black flake8

      - name: Run Black
        run: python -m black --check .

      - name: Run Flake8
        run: python -m flake8 app tests

      - name: Run Pytest
        run: python -m pytest --maxfail=1 --disable-warnings -q

      - name: Run Alembic migration check
        run: python -m alembic upgrade head

  deploy:
    name: Build and Deploy Docker Compose
    needs: lint-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up Docker Compose
        uses: docker/compose-action@v3
        with:
          version: v2

      - name: Build Docker Compose services
        run: docker compose build

      - name: Deploy Docker Compose services
        run: docker compose up -d

      - name: List running Docker Compose services
        run: docker compose ps
