apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fover-backend-worker-hpa
  namespace: fover-backend
  labels:
    app: fover-backend-worker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fover-backend-worker
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 50
