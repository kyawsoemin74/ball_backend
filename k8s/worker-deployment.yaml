apiVersion: apps/v1
kind: Deployment
metadata:
  name: fover-backend-worker
  namespace: fover-backend
  labels:
    app: fover-backend-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fover-backend-worker
  template:
    metadata:
      labels:
        app: fover-backend-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/fover-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["python", "worker.py"]
          ports:
            - containerPort: 8001
              name: metrics
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: fover-backend-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: fover-backend-secrets
                  key: REDIS_URL
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: fover-backend-secrets
                  key: JWT_SECRET_KEY
            - name: FOOTBALL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: fover-backend-secrets
                  key: FOOTBALL_API_KEY
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: fover-backend-secrets
                  key: API_KEY
          readinessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /metrics
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
