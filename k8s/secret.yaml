apiVersion: v1
kind: Secret
metadata:
  name: fover-backend-secrets
  namespace: fover-backend
  labels:
    app: fover-backend
stringData:
  JWT_SECRET_KEY: "replace-with-your-jwt-secret"
  DATABASE_URL: "postgresql://fover_user:242374@postgres.fover-backend.svc.cluster.local:5432/fover_db"
  FOOTBALL_API_KEY: "replace-with-football-api-key"
  REDIS_URL: "redis://redis.fover-backend.svc.cluster.local:6379/0"
  API_KEY: "replace-with-optional-api-key"
